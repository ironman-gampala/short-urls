<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="bg-pattern"></div>
  <main>
    <div class="logo">↗</div>
    <h1>Shorten it</h1>
    <p class="tagline">Paste any link and get a clean, short URL in one click.</p>
    <form id="shorten-form">
      <div class="input-wrap">
        <label for="url-input" class="field-label">URL to shorten</label>
        <input type="url" id="url-input" placeholder="https://example.com/very/long/url" autocomplete="url" required aria-describedby="url-hint">
        <p id="url-hint" class="hint">Must start with http:// or https://</p>
      </div>
      <div class="input-wrap input-wrap--optional">
        <label for="code-input" class="field-label">Custom short code <span class="optional-badge">optional</span></label>
        <input type="text" id="code-input" placeholder="Leave blank for a random code" autocomplete="off" maxlength="32" pattern="[A-Za-z0-9]*" title="Letters and numbers only" aria-describedby="code-hint">
        <p id="code-hint" class="hint">Leave empty and we’ll generate a random 7-character code (e.g. <code>xY7kL2m</code>). Or choose your own: letters and numbers only, 1–32 characters.</p>
      </div>
      <button type="submit" id="submit-btn">
        <span class="btn-text">Shorten</span>
      </button>
    </form>
    <div id="message" class="message" aria-live="polite"></div>
    <div id="result" class="result" hidden>
      <span class="result-label">Your short link</span>
      <div class="result-row">
        <a id="short-link" href="" target="_blank" rel="noopener noreferrer"></a>
        <button type="button" id="copy-btn" class="copy-btn" title="Copy">Copy</button>
      </div>
    </div>
  </main>
  <script src="/script.js"></script>
</body>
</html>
